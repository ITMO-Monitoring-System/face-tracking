services:
  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PUBLIC_PORT:-5673}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_BIND_PORT:-15673}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    command: ["/mediamtx.yml"]
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "${MEDIAMTX_RTSP_PUBLIC_PORT:-8554}:8554"
      - "127.0.0.1:${MEDIAMTX_API_BIND_PORT:-19999}:9999"
      - "${MEDIAMTX_WEBRTC_PUBLIC_PORT:-8888}:8888"

  face_tracking:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - rabbitmq
      - mediamtx
    ports:
      - "127.0.0.1:${APP_BIND_PORT:-18082}:8000"
    environment:
      OPENCV_FFMPEG_CAPTURE_OPTIONS: "${OPENCV_FFMPEG_CAPTURE_OPTIONS:-rtsp_transport;tcp|stimeout;5000000}"
      RABBITMQ_URL: "${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}"
      CONNECT_SERVICE_URL: "${CONNECT_SERVICE_URL:-http://89.111.170.130:8180/api/lecture/start}"
      CONNECT_SERVICE_IN_AMQP_URL: "${CONNECT_SERVICE_IN_AMQP_URL:-amqp://guest:guest@89.111.170.130:5673/}"
      CONNECT_SERVICE_THRESHOLD: "${CONNECT_SERVICE_THRESHOLD:-0.45}"
      RABBITMQ_EXCHANGE: "${RABBITMQ_EXCHANGE:-faces}"
      RABBITMQ_LECTURE_QUEUE_TEMPLATE: "${RABBITMQ_LECTURE_QUEUE_TEMPLATE:-faces.queue.lecture.{lecture_id}}"
      RABBITMQ_LECTURE_ROUTING_KEY_TEMPLATE: "${RABBITMQ_LECTURE_ROUTING_KEY_TEMPLATE:-lecture.{lecture_id}.face}"
      CAMERA_SOURCE: "${CAMERA_SOURCE:-rtsp://mediamtx:8554/lecture}"
      FPS: "${FPS:-15}"
      JPEG_QUALITY: "${JPEG_QUALITY:-80}"
      AUTO_PUBLISH_INTERVAL: "${AUTO_PUBLISH_INTERVAL:-1.0}"
      PUBLISH_MODE: "${PUBLISH_MODE:-faces}"
      FACE_PAD_Y_RATIO: "${FACE_PAD_Y_RATIO:-0.35}"
      FACE_TOP_EXTRA_RATIO: "${FACE_TOP_EXTRA_RATIO:-0.60}"
      FACE_BOTTOM_EXTRA_RATIO: "${FACE_BOTTOM_EXTRA_RATIO:-0.25}"
      FACE_CROP_MAKE_SQUARE: "${FACE_CROP_MAKE_SQUARE:-true}"
